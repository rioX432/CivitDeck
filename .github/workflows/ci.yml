name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      desktop: ${{ steps.filter.outputs.desktop }}
      shared: ${{ steps.filter.outputs.shared }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'shared/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradle/**'
            android:
              - 'androidApp/**'
              - 'config/detekt/**'
            ios:
              - 'iosApp/**'
            desktop:
              - 'desktopApp/**'
            ci:
              - '.github/workflows/**'

  android:
    name: Android Build & Test
    needs: changes
    if: >-
      needs.changes.outputs.android == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test, Lint & Build
        run: ./gradlew :shared:testDebugUnitTest detekt :androidApp:assembleDebug

  ios:
    name: iOS Build
    needs: changes
    if: >-
      needs.changes.outputs.ios == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.ci == 'true'
    # Apple Silicon runner: the KMP shared framework only configures the
    # iosSimulatorArm64 target, so xcodebuild must run on an arm64 host to
    # find the matching Shared.framework slice (macos-latest may be Intel).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # macos-14's default Xcode (15.4 / Swift 5.10) is borderline for the
      # @retroactive attribute; pin Xcode 16.2 (Swift 6.0) so the Swift app
      # code (Identifiable retroactive conformances, actor-isolation rules)
      # compiles reliably. 16.2 is available on the macos-14 image.
      - name: Select Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: cd iosApp && swiftlint --strict

      - name: Build iOS app
        # ARCHS=arm64 (+ ONLY_ACTIVE_ARCH=NO) constrains the build to arm64 only.
        # A 'generic/platform=iOS Simulator' destination otherwise builds both
        # arm64 and x86_64 slices, but the KMP shared framework only configures
        # iosSimulatorArm64, so the missing x86_64 slice breaks module resolution.
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'generic/platform=iOS Simulator' \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            EXPANDED_CODE_SIGN_IDENTITY=""

  desktop:
    name: Desktop Build
    needs: changes
    if: >-
      needs.changes.outputs.desktop == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile Desktop
        run: ./gradlew :desktopApp:compileKotlinJvm
