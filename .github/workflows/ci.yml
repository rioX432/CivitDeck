name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      desktop: ${{ steps.filter.outputs.desktop }}
      shared: ${{ steps.filter.outputs.shared }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'shared/**'
              - 'core/**'
              - 'feature/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle.properties'
              - 'gradle/**'
            android:
              - 'androidApp/**'
              - 'config/detekt/**'
            ios:
              - 'iosApp/**'
            desktop:
              - 'desktopApp/**'
            ci:
              - '.github/workflows/**'

  android:
    name: Android Build & Test
    needs: changes
    if: >-
      needs.changes.outputs.android == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test, Lint & Build
        # Feature/core ViewModel tests run via testAndroidHostTest (the Android host
        # unit-test task under com.android.kotlin.multiplatform.library — replaces the
        # old testDebugUnitTest, which no longer exists since the new KMP library plugin
        # has a single-variant model); comfyui runs via jvmTest because its use-case
        # tests need android.util.Log unmocked and ComfyUISettingsViewModelTest needs the
        # parameterless JVM GenerationNotificationService actual (the Android actual
        # requires a Context). core-database's only tests live in jvmTest (Fp16Test), so
        # it runs via :jvmTest — its androidHostTest source set is empty (the previous
        # :core:core-database:testDebugUnitTest line was a no-op for the same reason).
        run: >-
          ./gradlew
          :shared:testAndroidHostTest
          :core:core-database:jvmTest
          :core:core-domain:testAndroidHostTest
          :core:core-network:testAndroidHostTest
          :core:core-data:testAndroidHostTest
          :feature:feature-search:testAndroidHostTest
          :feature:feature-detail:testAndroidHostTest
          :feature:feature-gallery:testAndroidHostTest
          :feature:feature-prompts:testAndroidHostTest
          :feature:feature-creator:testAndroidHostTest
          :feature:feature-externalserver:testAndroidHostTest
          :feature:feature-comfyui:jvmTest
          detekt
          :androidApp:assembleDebug

  ios:
    name: iOS Build
    needs: changes
    if: >-
      needs.changes.outputs.ios == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.ci == 'true'
    # Apple Silicon runner: the KMP shared framework only configures the
    # iosSimulatorArm64 target, so xcodebuild must run on an arm64 host to
    # find the matching Shared.framework slice. macos-26 (Tahoe) is arm64 and
    # ships Xcode 26 (Swift 6.2) to match the local dev toolchain — the app
    # code uses Swift 6.1+ syntax (trailing commas, @retroactive), which
    # macos-14 (capped at Xcode 16.2 / Swift 6.0) cannot compile.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # Select the newest stable Xcode on the image (Xcode 26.x / Swift 6.2).
      # Required for Swift 6.1+ features used across the iOS app: trailing
      # commas in argument lists (SE-0439) and the @retroactive attribute.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache Kotlin/Native
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: cd iosApp && swiftlint --strict

      - name: Build iOS app
        # ARCHS=arm64 (+ ONLY_ACTIVE_ARCH=NO) constrains the build to arm64 only.
        # A 'generic/platform=iOS Simulator' destination otherwise builds both
        # arm64 and x86_64 slices, but the KMP shared framework only configures
        # iosSimulatorArm64, so the missing x86_64 slice breaks module resolution.
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'generic/platform=iOS Simulator' \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            EXPANDED_CODE_SIGN_IDENTITY=""

  desktop:
    name: Desktop Build
    needs: changes
    if: >-
      needs.changes.outputs.desktop == 'true' ||
      needs.changes.outputs.shared == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile Desktop
        run: ./gradlew :desktopApp:compileKotlinJvm
